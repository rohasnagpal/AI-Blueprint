[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# This fallback URL is relative to the current working directory.
# Prefer app startup migrations or run Alembic from the repository root with
# AI_BLUEPRINT_DATABASE_URL set to the intended database.
sqlalchemy.url = sqlite:///./ai_blueprint_v2.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
