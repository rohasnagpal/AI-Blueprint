name: Bug report
description: Report something that is not working as expected.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve AI Blueprint. Please include enough detail for maintainers to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the problem clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the problem.
      placeholder: |
        1. Start the app with ...
        2. Upload ...
        3. Ask ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages or logs when useful.
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.3"
    validations:
      required: false
  - type: dropdown
    id: rag-provider
    attributes:
      label: RAG provider
      options:
        - OpenAI RAG
        - Local RAG
        - Not sure
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, browser, model/provider, and anything else relevant.
    validations:
      required: false

