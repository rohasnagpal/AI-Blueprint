name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python files
        run: python -m compileall main.py database.py routes rag app migrations

      - name: Launch readiness tests
        run: python -m unittest discover -s tests

      - name: Smoke test v2 foundation
        env:
          AI_BLUEPRINT_DATABASE_URL: sqlite:////tmp/ai_blueprint_v2_ci.db
          AI_BLUEPRINT_APP_DATABASE_PATH: /tmp/ai_blueprint_app_ci.db
          AI_BLUEPRINT_UPLOADS_DIR: /tmp/ai_blueprint_v2_uploads
          AI_BLUEPRINT_SECRET_KEY_FILE: /tmp/ai_blueprint_v2_secret.key
          AI_BLUEPRINT_APP_SECRET_KEY_FILE: /tmp/ai_blueprint_app_secret.key
        run: |
          rm -f /tmp/ai_blueprint_v2_ci.db*
          rm -f /tmp/ai_blueprint_app_ci.db*
          rm -f /tmp/ai_blueprint_v2_secret.key
          rm -f /tmp/ai_blueprint_app_secret.key
          rm -rf /tmp/ai_blueprint_v2_uploads
          python scripts/v2_foundation_smoke.py

      - name: Smoke test v2 hardening
        env:
          AI_BLUEPRINT_DATABASE_URL: sqlite:////tmp/ai_blueprint_v2_hardening_ci.db
          AI_BLUEPRINT_APP_DATABASE_PATH: /tmp/ai_blueprint_app_hardening_ci.db
          AI_BLUEPRINT_UPLOADS_DIR: /tmp/ai_blueprint_v2_hardening_uploads
          AI_BLUEPRINT_SECRET_KEY_FILE: /tmp/ai_blueprint_v2_hardening_secret.key
          AI_BLUEPRINT_APP_SECRET_KEY_FILE: /tmp/ai_blueprint_app_hardening_secret.key
        run: |
          python scripts/v2_hardening_smoke.py
