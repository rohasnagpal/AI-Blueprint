name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python files
        run: python -m compileall main.py database.py routes rag app migrations

      - name: Launch readiness tests
        run: python -m unittest discover -s tests

      - name: Smoke test v2 foundation
        env:
          AI_BLUEPRINT_DATABASE_URL: sqlite:////tmp/ai_blueprint_v2_ci.db
          AI_BLUEPRINT_LEGACY_DATABASE_PATH: /tmp/ai_blueprint_legacy_ci.db
          AI_BLUEPRINT_UPLOADS_DIR: /tmp/ai_blueprint_v2_uploads
          AI_BLUEPRINT_SECRET_KEY_FILE: /tmp/ai_blueprint_v2_secret.key
          AI_BLUEPRINT_LEGACY_SECRET_KEY_FILE: /tmp/ai_blueprint_legacy_secret.key
        run: |
          rm -f /tmp/ai_blueprint_v2_ci.db*
          rm -f /tmp/ai_blueprint_v2_secret.key
          rm -rf /tmp/ai_blueprint_v2_uploads
          python - <<'PY'
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          from fastapi.testclient import TestClient

          from app.core.database import run_migrations
          from main import app
          import time

          run_migrations()
          with TestClient(app) as client:
              health = client.get("/api/v2/health")
              assert health.status_code == 200, health.text
              assert health.headers["x-request-id"]
              expected_head = ScriptDirectory.from_config(Config("alembic.ini")).get_current_head()
              assert health.json()["database"]["migration_revision"] == expected_head
              assert client.get("/api/v2/auth/setup-state").json()["setup_required"] is True
              setup = client.post(
                  "/api/v2/auth/setup",
                  json={
                      "email": "admin@example.com",
                      "display_name": "Admin",
                      "password": "0123456789ab",
                  },
              )
              assert setup.status_code == 200, setup.text
              workspace = client.post("/api/v2/workspaces", json={"name": "Firm Workspace", "slug": "firm"})
              assert workspace.status_code == 201, workspace.text
              workspace_id = workspace.json()["id"]
              navigation = client.get("/api/v2/me/navigation")
              assert navigation.status_code == 200, navigation.text
              assert navigation.json()["items"][0]["workspace_id"] == workspace_id
              assert any(item["id"] == "admin" for item in navigation.json()["items"][0]["items"])
              updated_workspace = client.put(f"/api/v2/workspaces/{workspace_id}", json={"name": "Firm Workspace Updated", "slug": "firm"})
              assert updated_workspace.status_code == 200, updated_workspace.text
              assert updated_workspace.json()["name"] == "Firm Workspace Updated"
              matter = client.post(f"/api/v2/workspaces/{workspace_id}/matters", json={"name": "Test Matter"})
              assert matter.status_code == 201, matter.text
              matter_detail = client.get(f"/api/v2/workspaces/{workspace_id}/matters/{matter.json()['id']}")
              assert matter_detail.status_code == 200, matter_detail.text
              assert matter_detail.json()["name"] == "Test Matter"
              plugins = client.get(f"/api/v2/workspaces/{workspace_id}/plugins")
              assert plugins.status_code == 200, plugins.text
              assert len(plugins.json()["items"]) == 3
              blocked = client.post(
                  f"/api/v2/workspaces/{workspace_id}/blueprints",
                  json={"name": "Blocked Contract Review", "plugin_id": "contract_review", "matter_id": matter.json()["id"]},
              )
              assert blocked.status_code == 403, blocked.text
              assert blocked.json()["code"] == "FORBIDDEN"
              assert "error" in blocked.json()
              enabled = client.put(f"/api/v2/workspaces/{workspace_id}/plugins/contract_review", json={"enabled": True})
              assert enabled.status_code == 200, enabled.text
              blueprint = client.post(
                  f"/api/v2/workspaces/{workspace_id}/blueprints",
                  json={"name": "Contract Review", "plugin_id": "contract_review", "matter_id": matter.json()["id"]},
              )
              assert blueprint.status_code == 201, blueprint.text
              blueprint_id = blueprint.json()["id"]
              document = client.post(
                  f"/api/v2/workspaces/{workspace_id}/documents",
                  json={
                      "original_name": "contract.pdf",
                      "matter_id": matter.json()["id"],
                      "content_hash": "abc123",
                      "mime_type": "application/pdf",
                      "size_bytes": 1234,
                      "scope": "matter",
                  },
              )
              assert document.status_code == 201, document.text
              document_id = document.json()["id"]
              upload = client.post(
                  f"/api/v2/workspaces/{workspace_id}/documents/upload",
                  data={"matter_id": matter.json()["id"], "scope": "matter"},
                  files={"file": ("uploaded.txt", b"hello scoped upload with termination and liability clauses", "text/plain")},
              )
              assert upload.status_code == 201, upload.text
              assert upload.json()["status"] == "stored"
              assert upload.json()["storage_key"].endswith(".txt")
              assert upload.json()["content_hash"]
              upload_job_id = upload.json()["job"]["id"]
              upload_document_id = upload.json()["id"]
              upload_job = None
              for _ in range(20):
                  upload_job = client.get(f"/api/v2/workspaces/{workspace_id}/jobs/{upload_job_id}")
                  assert upload_job.status_code == 200, upload_job.text
                  if upload_job.json()["job"]["status"] == "completed":
                      break
                  time.sleep(0.1)
              assert upload_job.json()["job"]["status"] == "completed", upload_job.text
              completed_cancel = client.put(f"/api/v2/workspaces/{workspace_id}/jobs/{upload_job_id}/cancel")
              assert completed_cancel.status_code == 400, completed_cancel.text
              indexed_document = client.get(f"/api/v2/workspaces/{workspace_id}/documents/{upload_document_id}")
              assert indexed_document.status_code == 200, indexed_document.text
              assert indexed_document.json()["status"] == "indexed"
              scoped_chat = client.post(
                  "/api/chats",
                  json={
                      "doc_context": "all",
                      "v2_workspace_id": workspace_id,
                      "v2_matter_id": matter.json()["id"],
                      "v2_document_ids": [upload_document_id],
                  },
              )
              assert scoped_chat.status_code == 200, scoped_chat.text
              assert scoped_chat.json()["v2_workspace_id"] == workspace_id
              assert scoped_chat.json()["v2_matter_id"] == matter.json()["id"]
              assert scoped_chat.json()["v2_document_ids"] == [upload_document_id]
              link = client.post(
                  f"/api/v2/workspaces/{workspace_id}/documents/{document_id}/links",
                  json={"blueprint_id": blueprint_id, "link_type": "contract"},
              )
              assert link.status_code == 201, link.text
              linked_docs = client.get(f"/api/v2/workspaces/{workspace_id}/documents/blueprints/{blueprint_id}/links")
              assert linked_docs.status_code == 200, linked_docs.text
              assert linked_docs.json()["total"] == 1
              temporary_document = client.post(
                  f"/api/v2/workspaces/{workspace_id}/documents",
                  json={"original_name": "Temporary Delete Test.txt", "scope": "workspace", "status": "registered"},
              )
              assert temporary_document.status_code == 201, temporary_document.text
              deleted_document = client.delete(f"/api/v2/workspaces/{workspace_id}/documents/{temporary_document.json()['id']}")
              assert deleted_document.status_code == 200, deleted_document.text
              missing_document = client.get(f"/api/v2/workspaces/{workspace_id}/documents/{temporary_document.json()['id']}")
              assert missing_document.status_code == 404, missing_document.text
              temporary_matter = client.post(f"/api/v2/workspaces/{workspace_id}/matters", json={"name": "Temporary Matter"})
              assert temporary_matter.status_code == 201, temporary_matter.text
              temporary_matter_id = temporary_matter.json()["id"]
              temporary_matter_document = client.post(
                  f"/api/v2/workspaces/{workspace_id}/documents",
                  json={"original_name": "matter-note.txt", "matter_id": temporary_matter_id, "scope": "matter", "status": "registered"},
              )
              assert temporary_matter_document.status_code == 201, temporary_matter_document.text
              deleted_matter = client.delete(f"/api/v2/workspaces/{workspace_id}/matters/{temporary_matter_id}")
              assert deleted_matter.status_code == 200, deleted_matter.text
              remaining_matters = client.get(f"/api/v2/workspaces/{workspace_id}/matters")
              assert remaining_matters.status_code == 200, remaining_matters.text
              assert all(item["id"] != temporary_matter_id for item in remaining_matters.json()["items"])
              detached_document = client.get(f"/api/v2/workspaces/{workspace_id}/documents/{temporary_matter_document.json()['id']}")
              assert detached_document.status_code == 200, detached_document.text
              assert detached_document.json()["matter_id"] is None
              personas = client.get(f"/api/v2/workspaces/{workspace_id}/personas")
              assert personas.status_code == 200, personas.text
              assert personas.json()["total"] >= 2
              builtin_persona_id = personas.json()["items"][0]["id"]
              created_persona = client.post(
                  f"/api/v2/workspaces/{workspace_id}/personas",
                  json={
                      "name": "Firm Contract Specialist",
                      "category": "Legal",
                      "description": "Applies firm contract review policy.",
                      "system_prompt": "Review contracts against the firm's playbook and identify evidence-backed risks.",
                      "constraints": ["Use citations", "Flag missing playbook coverage"],
                      "output_format": {"type": "memo"},
                      "tags": ["contract", "firm"],
                  },
              )
              assert created_persona.status_code == 201, created_persona.text
              assert created_persona.json()["workspace_id"] == workspace_id
              linked_persona = client.post(
                  f"/api/v2/workspaces/{workspace_id}/blueprints/{blueprint_id}/personas",
                  json={"persona_id": builtin_persona_id, "role": "reviewer"},
              )
              assert linked_persona.status_code == 201, linked_persona.text
              blueprint_personas = client.get(f"/api/v2/workspaces/{workspace_id}/blueprints/{blueprint_id}/personas")
              assert blueprint_personas.status_code == 200, blueprint_personas.text
              assert blueprint_personas.json()["total"] == 1
              assert blueprint_personas.json()["items"][0]["role"] == "reviewer"
              deleted_persona = client.delete(f"/api/v2/workspaces/{workspace_id}/personas/{created_persona.json()['id']}")
              assert deleted_persona.status_code == 200, deleted_persona.text
              missing_persona_list = client.get(f"/api/v2/workspaces/{workspace_id}/personas")
              assert missing_persona_list.status_code == 200, missing_persona_list.text
              assert all(item["id"] != created_persona.json()["id"] for item in missing_persona_list.json()["items"])
              created_secret = client.post(
                  f"/api/v2/workspaces/{workspace_id}/secrets",
                  json={"name": "OPENAI_API_KEY", "value": "sk-test-secret", "scope": "workspace"},
              )
              assert created_secret.status_code == 201, created_secret.text
              secret_body = created_secret.json()
              secret_id = secret_body["id"]
              assert secret_body["has_value"] is True
              assert "value" not in secret_body
              assert "encrypted_value" not in secret_body
              secrets = client.get(f"/api/v2/workspaces/{workspace_id}/secrets")
              assert secrets.status_code == 200, secrets.text
              assert secrets.json()["total"] == 1
              assert "sk-test-secret" not in secrets.text
              members = client.get(f"/api/v2/workspaces/{workspace_id}/members")
              assert members.status_code == 200, members.text
              assert members.json()["total"] == 1
              audit_events = client.get(f"/api/v2/workspaces/{workspace_id}/audit-events?action=persona.create")
              assert audit_events.status_code == 200, audit_events.text
              assert audit_events.json()["total"] == 1
              assert audit_events.json()["items"][0]["resource_type"] == "persona"
              settings = client.get(f"/api/v2/workspaces/{workspace_id}/settings")
              assert settings.status_code == 200, settings.text
              assert any(item["key"] == "default_jurisdiction" and item["is_default"] for item in settings.json()["items"])
              updated_setting = client.put(
                  f"/api/v2/workspaces/{workspace_id}/settings/default_jurisdiction",
                  json={"value": "England and Wales"},
              )
              assert updated_setting.status_code == 200, updated_setting.text
              assert updated_setting.json()["value"] == "England and Wales"
              secret_setting_denied = client.put(
                  f"/api/v2/workspaces/{workspace_id}/settings/openai_api_key",
                  json={"value": "sk-should-not-be-setting"},
              )
              assert secret_setting_denied.status_code == 404, secret_setting_denied.text
              added_member = client.post(
                  f"/api/v2/workspaces/{workspace_id}/members",
                  json={
                      "email": "second@example.com",
                      "display_name": "Second User",
                      "password": "0123456789ab",
                      "role": "member",
                  },
              )
              assert added_member.status_code == 201, added_member.text
              assert added_member.json()["role"] == "member"
              second_user_id = added_member.json()["user_id"]
              promoted_member = client.put(
                  f"/api/v2/workspaces/{workspace_id}/members/{second_user_id}",
                  json={"role": "admin"},
              )
              assert promoted_member.status_code == 200, promoted_member.text
              assert promoted_member.json()["role"] == "admin"
              demoted_member = client.put(
                  f"/api/v2/workspaces/{workspace_id}/members/{second_user_id}",
                  json={"role": "member"},
              )
              assert demoted_member.status_code == 200, demoted_member.text
              assert demoted_member.json()["role"] == "member"
              blueprint_members = client.get(f"/api/v2/workspaces/{workspace_id}/blueprints/{blueprint_id}/members")
              assert blueprint_members.status_code == 200, blueprint_members.text
              assert blueprint_members.json()["total"] == 1
              added_blueprint_member = client.post(
                  f"/api/v2/workspaces/{workspace_id}/blueprints/{blueprint_id}/members",
                  json={"user_id": second_user_id, "role": "viewer"},
              )
              assert added_blueprint_member.status_code == 201, added_blueprint_member.text
              assert added_blueprint_member.json()["role"] == "viewer"
              updated_blueprint_member = client.put(
                  f"/api/v2/workspaces/{workspace_id}/blueprints/{blueprint_id}/members/{second_user_id}",
                  json={"role": "editor"},
              )
              assert updated_blueprint_member.status_code == 200, updated_blueprint_member.text
              assert updated_blueprint_member.json()["role"] == "editor"
              removed_blueprint_member = client.delete(f"/api/v2/workspaces/{workspace_id}/blueprints/{blueprint_id}/members/{second_user_id}")
              assert removed_blueprint_member.status_code == 200, removed_blueprint_member.text
              temporary_blueprint = client.post(
                  f"/api/v2/workspaces/{workspace_id}/blueprints",
                  json={"name": "Temporary Delete Blueprint", "plugin_id": "contract_review", "matter_id": matter.json()["id"]},
              )
              assert temporary_blueprint.status_code == 201, temporary_blueprint.text
              temporary_blueprint_id = temporary_blueprint.json()["id"]
              temporary_link = client.post(
                  f"/api/v2/workspaces/{workspace_id}/documents/{document_id}/links",
                  json={"blueprint_id": temporary_blueprint_id, "link_type": "contract"},
              )
              assert temporary_link.status_code == 201, temporary_link.text
              deleted_blueprint = client.delete(f"/api/v2/workspaces/{workspace_id}/blueprints/{temporary_blueprint_id}")
              assert deleted_blueprint.status_code == 200, deleted_blueprint.text
              remaining_blueprints = client.get(f"/api/v2/workspaces/{workspace_id}/blueprints")
              assert remaining_blueprints.status_code == 200, remaining_blueprints.text
              assert all(item["id"] != temporary_blueprint_id for item in remaining_blueprints.json()["items"])

              assert client.post("/api/v2/auth/logout").status_code == 200
              login = client.post("/api/v2/auth/login", json={"email": "second@example.com", "password": "0123456789ab"})
              assert login.status_code == 200, login.text
              member_navigation = client.get("/api/v2/me/navigation")
              assert member_navigation.status_code == 200, member_navigation.text
              assert not any(item["id"] == "admin" for item in member_navigation.json()["items"][0]["items"])
              denied = client.get(f"/api/v2/workspaces/{workspace_id}/blueprints/{blueprint_id}")
              assert denied.status_code == 403, denied.text
              visible = client.get(f"/api/v2/workspaces/{workspace_id}/blueprints")
              assert visible.status_code == 200, visible.text
              assert visible.json()["total"] == 0
              document_visible = client.get(f"/api/v2/workspaces/{workspace_id}/documents/{document_id}")
              assert document_visible.status_code == 200, document_visible.text
              link_denied = client.get(f"/api/v2/workspaces/{workspace_id}/documents/blueprints/{blueprint_id}/links")
              assert link_denied.status_code == 403, link_denied.text
              blueprint_personas_denied = client.get(f"/api/v2/workspaces/{workspace_id}/blueprints/{blueprint_id}/personas")
              assert blueprint_personas_denied.status_code == 403, blueprint_personas_denied.text
              secret_visible = client.get(f"/api/v2/workspaces/{workspace_id}/secrets")
              assert secret_visible.status_code == 200, secret_visible.text
              assert secret_visible.json()["total"] == 1
              secret_create_denied = client.post(
                  f"/api/v2/workspaces/{workspace_id}/secrets",
                  json={"name": "MEMBER_KEY", "value": "member-secret", "scope": "workspace"},
              )
              assert secret_create_denied.status_code == 403, secret_create_denied.text
              members_denied = client.get(f"/api/v2/workspaces/{workspace_id}/members")
              assert members_denied.status_code == 403, members_denied.text
              audit_denied = client.get(f"/api/v2/workspaces/{workspace_id}/audit-events")
              assert audit_denied.status_code == 403, audit_denied.text
              setting_update_denied = client.put(
                  f"/api/v2/workspaces/{workspace_id}/settings/default_jurisdiction",
                  json={"value": "New York"},
              )
              assert setting_update_denied.status_code == 403, setting_update_denied.text

              assert client.post("/api/v2/auth/logout").status_code == 200
              assert client.post("/api/v2/auth/login", json={"email": "admin@example.com", "password": "0123456789ab"}).status_code == 200
              rotated_secret = client.put(
                  f"/api/v2/workspaces/{workspace_id}/secrets/{secret_id}/rotate",
                  json={"value": "sk-rotated-secret"},
              )
              assert rotated_secret.status_code == 200, rotated_secret.text
              assert rotated_secret.json()["status"] == "active"
              assert "sk-rotated-secret" not in rotated_secret.text
              revoked_secret = client.delete(f"/api/v2/workspaces/{workspace_id}/secrets/{secret_id}")
              assert revoked_secret.status_code == 200, revoked_secret.text
              revoked_list = client.get(f"/api/v2/workspaces/{workspace_id}/secrets")
              assert revoked_list.status_code == 200, revoked_list.text
              assert revoked_list.json()["items"][0]["status"] == "revoked"
              council_plugin = client.put(f"/api/v2/workspaces/{workspace_id}/plugins/ai_council", json={"enabled": True})
              assert council_plugin.status_code == 200, council_plugin.text
              council_blueprint = client.post(
                  f"/api/v2/workspaces/{workspace_id}/blueprints",
                  json={"name": "Arbitration Council", "plugin_id": "ai_council", "matter_id": matter.json()["id"]},
              )
              assert council_blueprint.status_code == 201, council_blueprint.text
              council_blueprint_id = council_blueprint.json()["id"]
              council_doc_link = client.post(
                  f"/api/v2/workspaces/{workspace_id}/documents/{upload_document_id}/links",
                  json={"blueprint_id": council_blueprint_id, "link_type": "evidence"},
              )
              assert council_doc_link.status_code == 201, council_doc_link.text
              council_config = {
                  "name": "Arbitration Council",
                  "agents": [{"id": "a1", "name": "Claimant Counsel", "provider": "mock"}],
                  "phases": [{"id": "p1", "name": "Initial Position", "agents": ["a1"]}],
              }
              saved_config = client.put(
                  f"/api/v2/workspaces/{workspace_id}/blueprints/{council_blueprint_id}/council/config",
                  json={"config": council_config},
              )
              assert saved_config.status_code == 200, saved_config.text
              council_run = client.post(
                  f"/api/v2/workspaces/{workspace_id}/blueprints/{council_blueprint_id}/council/runs",
                  json={"title": "Strategy Run", "objective": "Prepare initial issues."},
              )
              assert council_run.status_code == 201, council_run.text
              council_run_id = council_run.json()["id"]
              assert council_run.json()["status"] == "pending"
              council_job_id = council_run.json()["job"]["id"]
              job_detail = None
              for _ in range(20):
                  job_detail = client.get(f"/api/v2/workspaces/{workspace_id}/jobs/{council_job_id}")
                  assert job_detail.status_code == 200, job_detail.text
                  if job_detail.json()["job"]["status"] == "completed":
                      break
                  time.sleep(0.1)
              assert job_detail.status_code == 200, job_detail.text
              assert job_detail.json()["job"]["status"] == "completed"
              assert job_detail.json()["job"]["progress"] == 100
              assert job_detail.json()["events"][0]["content"] == "Council run queued"
              finished_run = client.get(f"/api/v2/workspaces/{workspace_id}/blueprints/{council_blueprint_id}/council/runs/{council_run_id}")
              assert finished_run.status_code == 200, finished_run.text
              assert finished_run.json()["run"]["status"] == "completed"
              assert len(finished_run.json()["outputs"]) == 1
              assert len(finished_run.json()["evidence"]) == 1
              assert finished_run.json()["evidence"][0]["sources"][0]["doc_id"] == upload_document_id
              council_export = client.get(f"/api/v2/workspaces/{workspace_id}/blueprints/{council_blueprint_id}/council/runs/{council_run_id}/export")
              assert council_export.status_code == 200, council_export.text
              assert "## Objective" in council_export.text
              assert "## Evidence" in council_export.text

              assert client.post("/api/v2/auth/logout").status_code == 200
              assert client.post("/api/v2/auth/login", json={"email": "second@example.com", "password": "0123456789ab"}).status_code == 200
              council_denied = client.get(f"/api/v2/workspaces/{workspace_id}/blueprints/{council_blueprint_id}/council/runs/{council_run_id}")
              assert council_denied.status_code == 403, council_denied.text
              job_denied = client.get(f"/api/v2/workspaces/{workspace_id}/jobs/{council_job_id}")
              assert job_denied.status_code == 403, job_denied.text

              assert client.post("/api/v2/auth/logout").status_code == 200
              assert client.post("/api/v2/auth/login", json={"email": "admin@example.com", "password": "0123456789ab"}).status_code == 200
              contract_plugin = client.put(f"/api/v2/workspaces/{workspace_id}/plugins/contract_review", json={"enabled": True})
              assert contract_plugin.status_code == 200, contract_plugin.text
              contract_blueprint = client.post(
                  f"/api/v2/workspaces/{workspace_id}/blueprints",
                  json={"name": "Contract Review", "plugin_id": "contract_review", "matter_id": matter.json()["id"]},
              )
              assert contract_blueprint.status_code == 201, contract_blueprint.text
              contract_blueprint_id = contract_blueprint.json()["id"]
              contract_link = client.post(
                  f"/api/v2/workspaces/{workspace_id}/documents/{upload_document_id}/links",
                  json={"blueprint_id": contract_blueprint_id, "link_type": "contract"},
              )
              assert contract_link.status_code == 201, contract_link.text
              contract_config = client.put(
                  f"/api/v2/workspaces/{workspace_id}/blueprints/{contract_blueprint_id}/contract-review/config",
                  json={"config": {"fields": ["parties", "payment", "governing_law"], "review_depth": "standard"}},
              )
              assert contract_config.status_code == 200, contract_config.text
              contract_run = client.post(
                  f"/api/v2/workspaces/{workspace_id}/blueprints/{contract_blueprint_id}/contract-review/runs",
                  json={"title": "Initial Contract Review"},
              )
              assert contract_run.status_code == 201, contract_run.text
              contract_run_id = contract_run.json()["id"]
              contract_job_id = contract_run.json()["job"]["id"]
              contract_job = None
              for _ in range(20):
                  contract_job = client.get(f"/api/v2/workspaces/{workspace_id}/jobs/{contract_job_id}")
                  assert contract_job.status_code == 200, contract_job.text
                  if contract_job.json()["job"]["status"] == "completed":
                      break
                  time.sleep(0.1)
              assert contract_job.json()["job"]["status"] == "completed", contract_job.text
              contract_result = client.get(f"/api/v2/workspaces/{workspace_id}/blueprints/{contract_blueprint_id}/contract-review/runs/{contract_run_id}")
              assert contract_result.status_code == 200, contract_result.text
              assert contract_result.json()["run"]["status"] == "completed"
              assert contract_result.json()["output"]["client_summary"]
              assert len(contract_result.json()["output"]["risk_matrix"]) >= 1
              contract_export = client.get(f"/api/v2/workspaces/{workspace_id}/blueprints/{contract_blueprint_id}/contract-review/runs/{contract_run_id}/export")
              assert contract_export.status_code == 200, contract_export.text
              assert "## Risk Matrix" in contract_export.text
              assert "Human legal review required" in contract_export.text
              escalations = client.get(f"/api/v2/workspaces/{workspace_id}/escalations/blueprints/{contract_blueprint_id}")
              assert escalations.status_code == 200, escalations.text
              assert escalations.json()["total"] >= 1
              assert escalations.json()["items"][0]["status"] == "open"
              resolved_escalation = client.put(f"/api/v2/workspaces/{workspace_id}/escalations/{escalations.json()['items'][0]['id']}/resolve")
              assert resolved_escalation.status_code == 200, resolved_escalation.text
              assert resolved_escalation.json()["status"] == "resolved"
              research_plugin = client.put(f"/api/v2/workspaces/{workspace_id}/plugins/legal_research", json={"enabled": True})
              assert research_plugin.status_code == 200, research_plugin.text
              research_blueprint = client.post(
                  f"/api/v2/workspaces/{workspace_id}/blueprints",
                  json={"name": "Research Memo", "plugin_id": "legal_research", "matter_id": matter.json()["id"]},
              )
              assert research_blueprint.status_code == 201, research_blueprint.text
              research_blueprint_id = research_blueprint.json()["id"]
              research_link = client.post(
                  f"/api/v2/workspaces/{workspace_id}/documents/{upload_document_id}/links",
                  json={"blueprint_id": research_blueprint_id, "link_type": "authority"},
              )
              assert research_link.status_code == 201, research_link.text
              research_config = client.put(
                  f"/api/v2/workspaces/{workspace_id}/blueprints/{research_blueprint_id}/legal-research/config",
                  json={"config": {"jurisdiction": "England and Wales", "memo_format": "IRAC"}},
              )
              assert research_config.status_code == 200, research_config.text
              research_run = client.post(
                  f"/api/v2/workspaces/{workspace_id}/blueprints/{research_blueprint_id}/legal-research/runs",
                  json={"title": "Authority Pack", "question": "What test applies to termination and liability clauses?"},
              )
              assert research_run.status_code == 201, research_run.text
              research_run_id = research_run.json()["id"]
              research_job_id = research_run.json()["job"]["id"]
              research_job = None
              for _ in range(20):
                  research_job = client.get(f"/api/v2/workspaces/{workspace_id}/jobs/{research_job_id}")
                  assert research_job.status_code == 200, research_job.text
                  if research_job.json()["job"]["status"] == "completed":
                      break
                  time.sleep(0.1)
              assert research_job.json()["job"]["status"] == "completed", research_job.text
              research_result = client.get(f"/api/v2/workspaces/{workspace_id}/blueprints/{research_blueprint_id}/legal-research/runs/{research_run_id}")
              assert research_result.status_code == 200, research_result.text
              assert research_result.json()["run"]["status"] == "completed"
              assert research_result.json()["output"]["research_memo"]
              assert len(research_result.json()["output"]["citation_pack"]) >= 1
              research_export = client.get(f"/api/v2/workspaces/{workspace_id}/blueprints/{research_blueprint_id}/legal-research/runs/{research_run_id}/export")
              assert research_export.status_code == 200, research_export.text
              assert "## Research Memo" in research_export.text
              assert "## Citation Pack" in research_export.text
              skills = client.get("/api/v2/skills")
              assert skills.status_code == 200, skills.text
              assert any(item["id"] == "contract.extract_fields" for item in skills.json()["items"])
              assert any(item["id"] == "research.memo" for item in skills.json()["items"])
              skill_runs = client.get(f"/api/v2/workspaces/{workspace_id}/blueprints/{contract_blueprint_id}/skill-runs")
              assert skill_runs.status_code == 200, skill_runs.text
              assert skill_runs.json()["total"] == 4
              research_skill_runs = client.get(f"/api/v2/workspaces/{workspace_id}/blueprints/{research_blueprint_id}/skill-runs")
              assert research_skill_runs.status_code == 200, research_skill_runs.text
              assert research_skill_runs.json()["total"] == 4
              deleted_council_run = client.delete(f"/api/v2/workspaces/{workspace_id}/blueprints/{council_blueprint_id}/council/runs/{council_run_id}")
              assert deleted_council_run.status_code == 200, deleted_council_run.text
              missing_council_run = client.get(f"/api/v2/workspaces/{workspace_id}/blueprints/{council_blueprint_id}/council/runs/{council_run_id}")
              assert missing_council_run.status_code == 404, missing_council_run.text
              deleted_contract_run = client.delete(f"/api/v2/workspaces/{workspace_id}/blueprints/{contract_blueprint_id}/contract-review/runs/{contract_run_id}")
              assert deleted_contract_run.status_code == 200, deleted_contract_run.text
              missing_contract_run = client.get(f"/api/v2/workspaces/{workspace_id}/blueprints/{contract_blueprint_id}/contract-review/runs/{contract_run_id}")
              assert missing_contract_run.status_code == 404, missing_contract_run.text
              deleted_research_run = client.delete(f"/api/v2/workspaces/{workspace_id}/blueprints/{research_blueprint_id}/legal-research/runs/{research_run_id}")
              assert deleted_research_run.status_code == 200, deleted_research_run.text
              missing_research_run = client.get(f"/api/v2/workspaces/{workspace_id}/blueprints/{research_blueprint_id}/legal-research/runs/{research_run_id}")
              assert missing_research_run.status_code == 404, missing_research_run.text
              deleted_workspace = client.delete(f"/api/v2/workspaces/{workspace_id}")
              assert deleted_workspace.status_code == 200, deleted_workspace.text
              hidden_workspace = client.get(f"/api/v2/workspaces/{workspace_id}")
              assert hidden_workspace.status_code == 404, hidden_workspace.text
              workspaces = client.get("/api/v2/workspaces")
              assert workspaces.status_code == 200, workspaces.text
              assert all(item["id"] != workspace_id for item in workspaces.json()["items"])
          PY

