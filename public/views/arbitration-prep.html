  <!-- ── ARBITRATION PREP VIEW ── -->
  <div class="view" id="view-arbitration-prep">
    <div class="add-doc-view translate-view draft-view">
      <div class="view-header">
        <h2>Arbitration Prep</h2>
        <p>Prepare structured arbitration work product from indexed matter documents.</p>
      </div>

      <div class="upload-scope-panel" id="arbitration-prep-scope-card">
        <div class="council-field">
          <label for="arbitration-prep-workspace-select">Workspace</label>
          <select class="council-select" id="arbitration-prep-workspace-select" onchange="onArbitrationPrepWorkspaceChange()"></select>
        </div>
        <div class="council-field">
          <label for="arbitration-prep-matter-select">Matter</label>
          <select class="council-select" id="arbitration-prep-matter-select" onchange="renderArbitrationPrepSourceDocuments()"></select>
        </div>
      </div>

      <div class="settings-card translate-setup-card draft-setup-card">
        <div class="council-form">
          <div class="council-form-row">
            <div class="council-field">
              <label for="arbitration-prep-title">Run title</label>
              <input class="council-input" id="arbitration-prep-title" placeholder="Arbitration prep"/>
            </div>
            <div class="council-field">
              <label for="arbitration-prep-party-role">Party role</label>
              <select class="council-select" id="arbitration-prep-party-role">
                <option value="claimant">Claimant</option>
                <option value="respondent">Respondent</option>
                <option value="third party">Third party</option>
                <option value="neutral analysis" selected>Neutral analysis</option>
              </select>
            </div>
            <div class="council-field">
              <label for="arbitration-prep-forum-rules">Forum / rules</label>
              <select class="council-select" id="arbitration-prep-forum-rules">
                <option value="">Not specified</option>
                <option value="ICC">ICC</option>
                <option value="LCIA">LCIA</option>
                <option value="SIAC">SIAC</option>
                <option value="UNCITRAL">UNCITRAL</option>
                <option value="AAA/ICDR">AAA/ICDR</option>
                <option value="ad hoc">ad hoc</option>
                <option value="other">other</option>
              </select>
            </div>
          </div>
          <div class="council-form-row">
            <div class="council-field">
              <label for="arbitration-prep-seat">Seat / jurisdiction</label>
              <input class="council-input" id="arbitration-prep-seat" placeholder="Singapore, London, New York"/>
            </div>
            <div class="council-field">
              <label for="arbitration-prep-stage">Procedural stage</label>
              <input class="council-input" id="arbitration-prep-stage" placeholder="Pleadings, disclosure, pre-hearing"/>
            </div>
            <div class="council-field">
              <label for="arbitration-prep-dates">Hearing / deadline dates</label>
              <input class="council-input" id="arbitration-prep-dates" placeholder="2026-07-15, 2026-08-01"/>
            </div>
          </div>
          <div class="council-field" id="arbitration-prep-source-documents-field">
            <label for="arbitration-prep-source-documents">Indexed source documents</label>
            <select class="council-select draft-source-select" id="arbitration-prep-source-documents" multiple></select>
          </div>
          <div class="council-field">
            <label for="arbitration-prep-instructions">Prep instructions</label>
            <textarea class="council-textarea" id="arbitration-prep-instructions" rows="4" placeholder="Focus issues, witnesses, procedural orders, damages, evidence gaps, or hearing priorities"></textarea>
          </div>
        </div>
      </div>

      <div class="translate-actions">
        <button class="btn-primary" type="button" id="arbitration-prep-run-btn" onclick="runArbitrationPrep()">Run Prep</button>
        <button class="btn-secondary" type="button" onclick="resetArbitrationPrep()">Clear</button>
        <span class="translate-status" id="arbitration-prep-status"></span>
      </div>

      <div class="settings-card translate-setup-card draft-setup-card" id="arbitration-prep-history-card" data-csp-style="display:none">
        <div class="settings-card-header">
          <div><div class="settings-card-title">Recent Runs</div><div class="settings-card-subtitle">Persisted arbitration preparation runs.</div></div>
        </div>
        <div class="council-list" id="arbitration-prep-history-list"></div>
      </div>

      <div class="translate-result-grid draft-result-grid" id="arbitration-prep-result-grid" data-csp-style="display:none">
        <div class="settings-card translate-result-card draft-result-card">
          <div class="settings-card-header">
            <div><div class="settings-card-title">Preparation Package</div><div class="settings-card-subtitle" id="arbitration-prep-result-meta"></div></div>
            <div class="settings-card-actions">
              <button class="icon-btn translate-result-icon-btn" type="button" title="Copy package" aria-label="Copy package" onclick="copyArbitrationPrep()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              </button>
              <button class="icon-btn translate-result-icon-btn" type="button" title="Download Markdown" aria-label="Download Markdown" onclick="downloadArbitrationPrep()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              </button>
            </div>
          </div>
          <div class="translate-html-preview draft-html-preview" id="arbitration-prep-preview"></div>
        </div>

        <div class="settings-card translate-review-card">
          <div class="settings-card-header">
            <div><div class="settings-card-title">Sources & Audit</div><div class="settings-card-subtitle">Trace, warnings, and source basis.</div></div>
          </div>
          <div class="translate-review-list" id="arbitration-prep-side-list"></div>
        </div>
      </div>
    </div>
  </div>
