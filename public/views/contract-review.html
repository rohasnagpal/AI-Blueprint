  <!-- ── CONTRACT REVIEW VIEW ── -->
  <div class="view" id="view-contract-review">
    <div class="add-doc-view translate-view draft-view">
      <div class="view-header">
        <h2>Contract Review</h2>
        <p>Review indexed contracts directly from a workspace.</p>
      </div>

      <div class="upload-scope-panel" id="contract-review-scope-card">
        <div class="council-field">
          <label for="contract-review-workspace-select">Workspace</label>
          <select class="council-select" id="contract-review-workspace-select" onchange="onContractReviewWorkspaceChange()"></select>
        </div>
        <div class="council-field">
          <label for="contract-review-matter-select">Matter</label>
          <select class="council-select" id="contract-review-matter-select" onchange="renderContractReviewSourceDocuments()"></select>
        </div>
      </div>

      <div class="settings-card translate-setup-card draft-setup-card">
        <div class="council-form">
          <div class="council-form-row">
            <div class="council-field">
              <label for="contract-review-title">Review title</label>
              <input class="council-input" id="contract-review-title" placeholder="Contract review"/>
            </div>
            <div class="council-field">
              <label for="contract-review-depth">Review depth</label>
              <select class="council-select" id="contract-review-depth">
                <option value="standard">Standard</option>
                <option value="detailed">Detailed</option>
                <option value="red-flag">Red-flag only</option>
              </select>
            </div>
            <div class="council-field">
              <label for="contract-review-playbook">Playbook</label>
              <select class="council-select" id="contract-review-playbook"></select>
            </div>
          </div>
          <div class="council-field" id="contract-review-source-documents-field">
            <label for="contract-review-source-documents">Source contracts</label>
            <select class="council-select draft-source-select" id="contract-review-source-documents" multiple></select>
          </div>
          <div class="council-field">
            <label for="contract-review-instructions">Review instructions</label>
            <textarea class="council-textarea" id="contract-review-instructions" rows="4" placeholder="Optional focus areas, negotiation posture, jurisdiction, clause concerns, or client position"></textarea>
          </div>
        </div>
      </div>

      <div class="translate-actions">
        <button class="btn-primary" type="button" id="contract-review-run-btn" onclick="runStandaloneContractReview()">Review Contract</button>
        <button class="btn-secondary" type="button" onclick="resetStandaloneContractReview()">Clear</button>
        <span class="translate-status" id="contract-review-status"></span>
      </div>

      <div class="settings-card translate-setup-card draft-setup-card" id="contract-review-history-card" data-csp-style="display:none">
        <div class="settings-card-header">
          <div><div class="settings-card-title">Recent Reviews</div><div class="settings-card-subtitle">Persisted agentic review runs.</div></div>
        </div>
        <div class="council-list" id="contract-review-history-list"></div>
      </div>

      <div class="translate-result-grid draft-result-grid" id="contract-review-result-grid" data-csp-style="display:none">
        <div class="settings-card translate-result-card draft-result-card">
          <div class="settings-card-header">
            <div><div class="settings-card-title">Review Result</div><div class="settings-card-subtitle" id="contract-review-result-meta"></div></div>
            <div class="settings-card-actions">
              <button class="icon-btn translate-result-icon-btn" type="button" title="Copy review" aria-label="Copy review" onclick="copyStandaloneContractReview()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              </button>
              <button class="icon-btn translate-result-icon-btn" type="button" title="Download Markdown" aria-label="Download Markdown" onclick="downloadStandaloneContractReview()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              </button>
            </div>
          </div>
          <div class="translate-html-preview draft-html-preview" id="contract-review-preview"></div>
        </div>

        <div class="settings-card translate-review-card">
          <div class="settings-card-header">
            <div><div class="settings-card-title">Sources & Warnings</div><div class="settings-card-subtitle">Review basis and required human checks.</div></div>
          </div>
          <div class="translate-review-list" id="contract-review-side-list"></div>
        </div>
      </div>
    </div>
  </div>
