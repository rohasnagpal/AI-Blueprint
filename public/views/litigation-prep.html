  <!-- ── LITIGATION PREP VIEW ── -->
  <div class="view" id="view-litigation-prep">
    <div class="add-doc-view translate-view draft-view">
      <div class="view-header">
        <h2>Litigation Prep</h2>
        <p>Prepare structured litigation work product from indexed matter documents.</p>
      </div>

      <div class="upload-scope-panel" id="litigation-prep-scope-card">
        <div class="council-field">
          <label for="litigation-prep-workspace-select">Workspace</label>
          <select class="council-select" id="litigation-prep-workspace-select" onchange="onLitigationPrepWorkspaceChange()"></select>
        </div>
        <div class="council-field">
          <label for="litigation-prep-matter-select">Matter</label>
          <select class="council-select" id="litigation-prep-matter-select" onchange="onLitigationPrepMatterChange()"></select>
        </div>
      </div>

      <div class="settings-card translate-setup-card draft-setup-card">
        <div class="council-form">
          <div class="council-form-row">
            <div class="council-field">
              <label for="litigation-prep-title">Run title</label>
              <input class="council-input" id="litigation-prep-title" placeholder="Litigation prep"/>
            </div>
            <div class="council-field">
              <label for="litigation-prep-party-role">Party role</label>
              <select class="council-select" id="litigation-prep-party-role">
                <option value="plaintiff">Plaintiff</option>
                <option value="defendant">Defendant</option>
                <option value="third party">Third party</option>
                <option value="neutral analysis" selected>Neutral analysis</option>
              </select>
            </div>
            <div class="council-field">
              <label for="litigation-prep-court">Court</label>
              <input class="council-input" id="litigation-prep-court" placeholder="Superior Court, SDNY, Commercial Court"/>
            </div>
          </div>
          <div class="council-form-row">
            <div class="council-field">
              <label for="litigation-prep-jurisdiction">Jurisdiction</label>
              <input class="council-input" id="litigation-prep-jurisdiction" placeholder="New York, England and Wales"/>
            </div>
            <div class="council-field">
              <label for="litigation-prep-venue">Venue</label>
              <input class="council-input" id="litigation-prep-venue" placeholder="County, division, district"/>
            </div>
            <div class="council-field">
              <label for="litigation-prep-stage">Procedural stage</label>
              <input class="council-input" id="litigation-prep-stage" placeholder="Pleadings, discovery, motion practice, trial prep"/>
            </div>
          </div>
          <div class="council-form-row">
            <div class="council-field">
              <label for="litigation-prep-focus">Litigation focus</label>
              <select class="council-select" id="litigation-prep-focus">
                <option value="full prep">Full prep</option>
                <option value="pleadings">Pleadings</option>
                <option value="discovery">Discovery</option>
                <option value="depositions">Depositions</option>
                <option value="motion practice">Motion practice</option>
                <option value="trial prep">Trial prep</option>
                <option value="damages">Damages</option>
              </select>
            </div>
            <div class="council-field">
              <label for="litigation-prep-dates">Hearing / deadline / trial dates</label>
              <input class="council-input" id="litigation-prep-dates" placeholder="2026-07-15, 2026-08-01"/>
            </div>
          </div>
          <div class="council-field" id="litigation-prep-source-documents-field">
            <label for="litigation-prep-source-documents">Indexed source documents</label>
            <select class="council-select draft-source-select" id="litigation-prep-source-documents" multiple></select>
          </div>
          <div class="council-field">
            <label for="litigation-prep-instructions">Prep instructions</label>
            <textarea class="council-textarea" id="litigation-prep-instructions" rows="4" placeholder="Focus pleadings, discovery gaps, depositions, motions, damages, trial prep, evidence gaps, or deadlines"></textarea>
          </div>
        </div>
      </div>

      <div class="translate-actions">
        <button class="btn-primary" type="button" id="litigation-prep-run-btn" onclick="runLitigationPrep()">Run Prep</button>
        <button class="btn-secondary" type="button" onclick="resetLitigationPrep()">Clear</button>
        <span class="translate-status" id="litigation-prep-status"></span>
      </div>

      <div class="settings-card translate-setup-card draft-setup-card" id="litigation-prep-history-card" data-csp-style="display:none">
        <div class="settings-card-header">
          <div><div class="settings-card-title">Recent Runs</div><div class="settings-card-subtitle">Persisted litigation preparation runs.</div></div>
        </div>
        <div class="council-list" id="litigation-prep-history-list"></div>
      </div>

      <div class="translate-result-grid draft-result-grid" id="litigation-prep-result-grid" data-csp-style="display:none">
        <div class="settings-card translate-result-card draft-result-card">
          <div class="settings-card-header">
            <div><div class="settings-card-title">Preparation Package</div><div class="settings-card-subtitle" id="litigation-prep-result-meta"></div></div>
            <div class="settings-card-actions">
              <button class="icon-btn translate-result-icon-btn" type="button" title="Copy package" aria-label="Copy package" onclick="copyLitigationPrep()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              </button>
              <button class="icon-btn translate-result-icon-btn" type="button" title="Download Markdown" aria-label="Download Markdown" onclick="downloadLitigationPrep()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              </button>
            </div>
          </div>
          <div class="translate-html-preview draft-html-preview" id="litigation-prep-preview"></div>
        </div>

        <div class="settings-card translate-review-card">
          <div class="settings-card-header">
            <div><div class="settings-card-title">Sources & Audit</div><div class="settings-card-subtitle">Trace, warnings, and source basis.</div></div>
          </div>
          <div class="translate-review-list" id="litigation-prep-side-list"></div>
        </div>
      </div>
    </div>
  </div>
