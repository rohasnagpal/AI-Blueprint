  <!-- ── CHAT VIEW ── -->
  <div class="view active" id="view-chat">
    <div class="chat-messages" id="chat-messages">
      <!-- Welcome screen -->
      <div class="welcome" id="welcome-screen">
        <div class="welcome-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </div>
        <h2 id="welcome-title">AI Blueprint by Rohas Nagpal</h2>
        <p id="welcome-intro">Open source AI-native infrastructure for Lawyers</p>
        <div class="suggestion-chips" id="suggestion-chips-list">
        </div>
      </div>

      <!-- Conversation populated dynamically -->
      <div class="msg-group" id="chat-conversation" data-csp-style="display:none"></div>
    </div>

    <!-- INPUT -->
    <div class="chat-input-area">
      <div class="input-wrapper">
        <div class="input-context-bar">
          <button class="input-mode-btn" type="button" onclick="toggleChatModeMenu(event)" title="Choose chat context">
            <span id="input-mode-icon"></span>
            <span id="input-mode-label">General</span>
            <svg class="input-mode-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <span class="input-doc-badge" id="input-doc-badge">No document search</span>
          <select class="s-select input-scope-select" id="chat-workspace-select" onchange="setChatWorkspaceFromInput(this.value)" title="Choose workspace" data-csp-style="display:none"></select>
          <select class="s-select input-scope-select" id="chat-matter-select" onchange="setChatMatterFromInput(this.value)" title="Choose matter" data-csp-style="display:none"></select>
          <select class="s-select input-persona-select" id="persona-select" onchange="setPersona(this.value)" title="Choose persona">
            <option value="">No persona</option>
          </select>
          <div class="input-mode-menu" id="input-mode-menu">
            <button class="input-mode-option" id="mode-option-documents" type="button" onclick="setChatMode('documents')">
              <strong>Documents</strong>
              <span>Search uploaded documents</span>
            </button>
            <button class="input-mode-option" id="mode-option-general" type="button" onclick="setChatMode('general')">
              <strong>General</strong>
              <span>No document search</span>
            </button>
            <button class="input-mode-option" id="mode-option-help" type="button" onclick="setChatMode('help')">
              <strong>Help</strong>
              <span>How to use AI Blueprint</span>
            </button>
          </div>
        </div>
        <div class="input-row">
          <textarea class="chat-textarea" id="chat-input" rows="1" placeholder="Ask anything..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <div class="input-actions">
            <button class="web-search-btn" id="web-search-btn" type="button" onclick="toggleWebSearch()" title="Search web">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 0 20"/><path d="M12 2a15.3 15.3 0 0 0 0 20"/></svg>
            </button>
            <button class="attach-btn" type="button" title="Upload document" aria-label="Upload document" onclick="openChatUpload()">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <button class="voice-btn" id="voice-btn" type="button" title="Start live voice" aria-label="Start live voice" onclick="toggleLiveVoice()">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 10v4"/><path d="M6 7v10"/><path d="M10 4v16"/><path d="M14 8v8"/><path d="M18 6v12"/><path d="M22 10v4"/></svg>
            </button>
            <button class="send-btn" id="chat-send-btn" type="button" title="Send message" aria-label="Send message" onclick="sendMessage()">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="input-hint">Built in India 🇮🇳 for the world by Rohas Nagpal.<br/>AI Blueprint may make mistakes. Always verify important information from the original documents.</div>
    </div>
  </div>
