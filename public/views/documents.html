  <!-- ── VIEW DOCUMENTS VIEW ── -->
  <div class="view" id="view-view-docs">
    <div class="view-docs-area">
      <div class="view-header">
        <h2>Your Documents</h2>
        <p>Browse and manage all documents in your knowledge base.</p>
      </div>

      <div class="docs-stats">
        <div class="stat-pill"><strong id="stat-docs-count">0</strong> documents</div>
        <div class="stat-pill"><strong id="stat-total-size">0 B</strong> total size</div>
        <div class="stat-pill"><strong id="stat-file-types">0</strong> file types</div>
      </div>

      <div class="connected-folders-panel docs-folder-sources">
        <div class="connected-folders-head">
          <div>
            <div class="settings-card-title">Folder Sources</div>
            <div class="settings-card-subtitle">Folders connected for repeat sync and folders imported through Browse.</div>
          </div>
        </div>
        <div class="connected-folders-list"></div>
      </div>

      <div class="docs-toolbar">
        <div class="search-input-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" type="text" placeholder="Search documents…" oninput="searchDocs(this.value)"/>
        </div>
        <div class="filter-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
          Filter
        </div>
        <div class="filter-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
          Sort
        </div>
      </div>

      <div class="docs-grid" id="docs-grid"></div>
    </div>
  </div>
