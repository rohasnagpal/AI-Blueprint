<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Blueprint by Rohas Nagpal</title>
<link rel="stylesheet" href="/css/fonts.css?v=20260526-self-host-fonts-v1"/>
<link rel="stylesheet" href="/css/app.css?v=20260529-agent-providers-v1"/>
<script src="/js/csp-styles.js?v=20260526-strict-style-csp-v1"></script>

</head>
<body class="chat-view-active">

<!-- SIDEBAR -->
<div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeMobileSidebar()" aria-hidden="true"></div>
<aside class="sidebar" id="app-sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    </div>
    <span class="brand-name" id="sidebar-brand-name">AI Blueprint</span>
  </div>

  <div class="sidebar-section" id="primary-nav"></div>

  <div class="sidebar-more-menu" id="sidebar-more-menu"></div>

  <div class="sidebar-divider"></div>

  <div class="sidebar-section">
    <div class="sidebar-label" id="chat-history-label">Recent Chats</div>
    <div data-csp-style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
      <button class="chat-filter-btn" id="chat-active-filter" type="button" onclick="setChatArchiveFilter(false)">Active</button>
      <button class="chat-filter-btn" id="chat-archived-filter" type="button" onclick="setChatArchiveFilter(true)">Archived</button>
      <button class="chat-filter-btn" type="button" onclick="toggleChatSelectMode()">Select</button>
    </div>
    <div id="chat-bulk-actions" data-csp-style="display:none;gap:6px;margin-top:6px;flex-wrap:wrap">
      <button class="chat-filter-btn danger" type="button" onclick="deleteSelectedChats()">Delete selected</button>
      <button class="chat-filter-btn danger" type="button" onclick="deleteAllVisibleChats()">Delete all</button>
      <button class="chat-filter-btn" type="button" onclick="toggleChatSelectMode(false)">Cancel</button>
    </div>
  </div>

  <div class="chat-history" id="chat-history-list"></div>

  <div class="sidebar-bottom">
    <div class="user-item" id="v2-auth-sidebar" onclick="openV2AuthFromSidebar()">
      <div class="user-avatar" id="v2-auth-avatar">U</div>
      <span id="v2-auth-sidebar-label">Sign in</span>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <!-- TOP BAR -->
  <div class="topbar">
    <button class="mobile-menu-btn" type="button" title="Open navigation" aria-label="Open navigation" onclick="openMobileSidebar()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
    </button>
    <span class="topbar-title" id="topbar-title">Chat</span>
    <div class="doc-selector" id="doc-selector" onclick="toggleChatModeMenu(event)" title="Choose chat context">
      <div class="dot"></div>
      <span id="topbar-doc-label">General</span>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-actions">
      <div class="topbar-search" id="topbar-chat-search">
        <input type="text" id="chat-search-input" placeholder="Search chats..." oninput="searchChats(this.value)" onkeydown="handleChatSearchKey(event)"/>
      </div>
      <button class="icon-btn" type="button" title="Search chats" onclick="toggleChatSearch()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="icon-btn" type="button" title="Download chat as Markdown" aria-label="Download chat as Markdown" onclick="downloadChatMarkdown()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="icon-btn" id="theme-icon-btn" type="button" title="Toggle dark mode" aria-label="Toggle dark mode" onclick="toggleTheme()">
        <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="icon-btn" id="v2-logout-topbar" type="button" title="Log out" aria-label="Log out" onclick="logoutV2()" data-csp-style="display:none">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
      <button class="icon-btn" id="topbar-help-btn" type="button" title="Help" aria-label="Help" onclick="activateHelpChat()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 1 1 5.82 1c0 2-3 2-3 4"/><path d="M12 17h.01"/></svg>
      </button>
    </div>
  </div>

  <div id="chat-view-slot"></div>

  <div id="personas-view-slot"></div>

  <div id="email-view-slot"></div>

  <div id="add-document-view-slot"></div>

  <div id="translate-view-slot"></div>

  <div id="contract-review-view-slot"></div>

  <div id="draft-view-slot"></div>

  <div id="documents-view-slot"></div>

  <!-- ── SETTINGS VIEW ── -->
  <div id="settings-view-slot"></div>

</main>

<div id="global-modals-slot"></div>

<div id="toast-container" data-csp-style="position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;"></div>


<script src="/js/csp-events.js?v=20260526-strict-csp-v2"></script>
<script src="/js/navigation.js?v=20260530-routed-pages-v2"></script>
<script src="/js/pages/settings-fragments.js?v=20260530-settings-fragments-v1"></script>
<script src="/js/app.js?v=20260530-routed-pages-v8"></script>
<script src="/js/v2.js?v=20260530-v2-bridge-v1"></script>
<script src="/js/pages/chat-history.js?v=20260530-pages-chat-history-v1"></script>
<script src="/js/pages/chat-scope.js?v=20260530-pages-chat-scope-v1"></script>
<script src="/js/pages/chat-stream.js?v=20260530-pages-chat-stream-v1"></script>
<script src="/js/pages/chat-voice.js?v=20260530-pages-chat-voice-v1"></script>
<script src="/js/pages/chat-rendering.js?v=20260530-pages-chat-rendering-v1"></script>
<script src="/js/pages/settings.js?v=20260530-pages-settings-v1"></script>
<script src="/js/pages/settings-models.js?v=20260530-pages-settings-models-v1"></script>
<script src="/js/pages/settings-workspaces.js?v=20260530-pages-settings-workspaces-v1"></script>
<script src="/js/pages/settings-admin-users.js?v=20260530-pages-settings-admin-users-v1"></script>
<script src="/js/pages/councils.js?v=20260530-pages-councils-v1"></script>
<script src="/js/pages/documents.js?v=20260530-pages-documents-v1"></script>
<script src="/js/pages/upload.js?v=20260530-pages-upload-v1"></script>
<script src="/js/pages/personas.js?v=20260530-pages-personas-v1"></script>
<script src="/js/pages/email.js?v=20260530-pages-email-v1"></script>
<script src="/js/pages/translate.js?v=20260530-pages-translate-v1"></script>
<script src="/js/pages/draft.js?v=20260530-pages-draft-v1"></script>
<script src="/js/pages/contract-review.js?v=20260530-pages-contract-review-v1"></script>
</body>
</html>
